services:
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: pulsehive-rabbitmq
    user: "999:999"
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  event-bus:
    build:
      context: ./services/event-bus
    container_name: pulsehive-event-bus
    ports:
      - "5000:5000"
    environment:
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      EVENT_SUBSCRIBERS: payment.matched=http://orders:4001/events,order.created=http://payments:4002/events
    depends_on:
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:5000/health', res => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  postgres:
    image: postgres:15-alpine
    container_name: pulsehive-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pulsehive
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: ./services/api
    container_name: pulsehive-api-gateway
    ports:
      - "4000:4000"
    depends_on:
      - orders
      - payments
      - auth

  orders:
    build:
      context: .
      dockerfile: services/orders/Dockerfile
    container_name: pulsehive-orders-service
    ports:
      - "4001:4001"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/pulsehive
      EVENT_BUS_URL: http://event-bus:5000
    depends_on:
      - postgres
      - event-bus

  payments:
    build:
      context: .
      dockerfile: services/payments/Dockerfile
    container_name: pulsehive-payments-service
    ports:
      - "4002:4002"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/pulsehive
      EVENT_BUS_URL: http://event-bus:5000
    depends_on:
      - postgres
      - event-bus

  auth:
    build:
      context: ./services/auth
    container_name: pulsehive-auth-service
    ports:
      - "4003:4003"
    environment:
      AUTH_SECRET: ${AUTH_SECRET:-dev-secret}

  web-admin:
    build:
      context: ./web-admin
    container_name: pulsehive-web-admin
    ports:
      - "3000:3000"
    depends_on:
      - api

  # mobile-app:
  #   build:
  #     context: ./mobile-app
  #   container_name: pulsehive-mobile-app
  #   ports:
  #     - "19000:19000"
  #     - "19001:19001"
  #     - "19002:19002"
  #   environment:
  #     EXPO_NO_BROWSER: "1"
  #     EXPO_DEVTOOLS_LISTEN_ADDRESS: "0.0.0.0"
  #     EXPO_DEVTOOLS_PORT: "19002"
  #   command: ["npm", "run", "start", "--", "--host", "lan", "--port", "19000"]
  #   depends_on:
  #     - api

volumes:
  postgres_data:
  rabbitmq_data:
