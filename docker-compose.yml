networks:
  pulsehive-mesh:
    driver: bridge

services:
  rabbitmq:
    image: rabbitmq:management-alpine
    container_name: pulsehive-rabbitmq
    user: "999:999"
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - pulsehive-mesh
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  postgres:
    image: postgres:latest
    container_name: pulsehive-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"
    networks:
      - pulsehive-mesh
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./services/db/config/init.sql:/docker-entrypoint-initdb.d/init.sql

  api:
    build:
      context: ./services/api
      dockerfile: Dockerfile
      args:
        - CI=true
    container_name: pulsehive-api-gateway
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=${NODE_ENV}
      - PORT=${API_PORT}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - AUTH_SERVICE_URL=${AUTH_SERVICE_URL}
      - ORDER_SERVICE_URL=${ORDER_SERVICE_URL}
      - PAYMENT_SERVICE_URL=${PAYMENT_SERVICE_URL}
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - orders
      - payments
      - auth
    networks:
      - pulsehive-mesh
    develop:
      watch:
        - path: ./services/api
          target: /app
          action: sync
          ignore:
            - node_modules/
        - path: ./services/api/package.json
          action: rebuild

  auth:
    build:
      context: ./services/auth
      dockerfile: Dockerfile
      args:
        - CI=true
    ports:
      - "4001:4001"
    container_name: pulsehive-auth-service
    environment:
      - DATABASE_URL=${AUTH_DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - NODE_ENV=${NODE_ENV}
    command: sh -c "npx prisma db push --url=$$DATABASE_URL && npm run start:dev"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - pulsehive-mesh
    develop:
      watch:
        - path: ./services/auth
          target: /app
          action: sync
          ignore:
            - node_modules/
        - path: ./services/auth/package.json
          action: rebuild

  orders:
    build:
      context: .
      dockerfile: services/orders/Dockerfile
    container_name: pulsehive-orders-service
    ports:
      - "4002:4002"
    environment:
      DATABASE_URL: ${ORDERS_DATABASE_URL}
      EVENT_BUS_URL: ${EVENT_BUS_URL}
    depends_on:
      - postgres
      - events
    networks:
      - pulsehive-mesh
    develop:
      watch:
        - path: ./services/orders
          target: /app
          action: sync
          ignore:
            - node_modules/
        - path: ./services/orders/package.json
          action: rebuild

  payments:
    build:
      context: .
      dockerfile: services/payments/Dockerfile
    container_name: pulsehive-payments-service
    ports:
      - "4003:4003"
    environment:
      DATABASE_URL: ${PAYMENT_DATABASE_URL}
      EVENT_BUS_URL: ${EVENT_BUS_URL}
    depends_on:
      - postgres
      - events
    networks:
      - pulsehive-mesh
    develop:
      watch:
        - path: ./services/payments
          target: /app
          action: sync
          ignore:
            - node_modules/
        - path: ./services/payments/package.json
          action: rebuild

  events:
    build:
      context: ./services/events
    container_name: pulsehive-event-bus
    ports:
      - "5000:5000"
    environment:
      RABBITMQ_URL: ${RABBITMQ_URL}
      EVENT_SUBSCRIBERS: payment.matched=http://orders:4002/events,order.created=http://payments:4003/events
    depends_on:
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:5000/health', res => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - pulsehive-mesh
    develop:
      watch:
        - path: ./services/events
          target: /app
          action: sync
          ignore:
            - node_modules/
        - path: ./services/events/package.json
          action: rebuild

  admin:
    build:
      context: ./apps/admin
      dockerfile: Dockerfile
    container_name: pulsehive-admin
    ports:
      - "3000:3000"
    command: npm run dev
    depends_on:
      - api
    environment:
      - NODE_ENV=${NODE_ENV}
      - WATCHPACK_POLLING=${WATCHPACK_POLLING}
      - CHOKIDAR_USEPOLLING=${CHOKIDAR_USEPOLLING}
    networks:
      - pulsehive-mesh
    develop:
      watch:
        - path: ./apps/admin
          target: /app
          action: sync
          ignore:
            - node_modules/
            - .next/
        - path: ./apps/admin/package.json
          action: rebuild

volumes:
  postgres_data:
  rabbitmq_data: