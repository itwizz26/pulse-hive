networks:
  pulsehive-mesh:
    driver: bridge

services:
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: pulsehive-rabbitmq
    user: "999:999"
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - pulsehive-mesh
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  postgres:
    image: postgres:15-alpine
    container_name: pulsehive-postgres
    environment:
      POSTGRES_USER: pulse_user
      POSTGRES_PASSWORD: P4ssw0rd
      POSTGRES_DB: pulsehive_auth
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pulse_user -d pulsehive_auth"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"
    networks:
      - pulsehive-mesh
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: ./services/api
      dockerfile: Dockerfile
      args:
        - CI=true
    container_name: pulsehive-api-gateway
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=development
      - PORT=4000
      - ALLOWED_ORIGINS=*
      - AUTH_SERVICE_URL=http://auth:4001
      - ORDER_SERVICE_URL=http://orders:4002
      - PAYMENT_SERVICE_URL=http://payments:4003
    depends_on:
      - orders
      - payments
      - auth
    networks:
      - pulsehive-mesh
    develop:
      watch:
        - path: ./services/api
          target: /app
          action: sync
          ignore:
            - node_modules/
        - path: ./services/api/package.json
          action: rebuild

  auth:
    build:
      context: ./services/auth
    env_file:
      - ./services/auth/.env
    ports:
      - "4001:4001"
    container_name: pulsehive-auth-service
    environment:
      - DATABASE_URL=postgresql://pulse_user:P4ssw0rd@postgres:5432/pulsehive_auth
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - pulsehive-mesh
    develop:
      watch:
        - path: ./services/auth
          target: /app
          action: sync
          ignore:
            - node_modules/
        - path: ./services/auth/package.json
          action: rebuild

  orders:
    build:
      context: .
      dockerfile: services/orders/Dockerfile
    container_name: pulsehive-orders-service
    ports:
      - "4002:4002"
    environment:
      DATABASE_URL: postgresql://pulse_user:P4ssw0rd@postgres:5432/pulsehive_orders
      EVENT_BUS_URL: http://events:5000
    depends_on:
      - postgres
      - events
    networks:
      - pulsehive-mesh
    develop:
      watch:
        - path: ./services/orders
          target: /app
          action: sync
          ignore:
            - node_modules/
        - path: ./services/orders/package.json
          action: rebuild

  payments:
    build:
      context: .
      dockerfile: services/payments/Dockerfile
    container_name: pulsehive-payments-service
    ports:
      - "4003:4003"
    environment:
      DATABASE_URL: postgresql://pulse_user:P4ssw0rd@postgres:5432/pulsehive_payments
      EVENT_BUS_URL: http://events:5000
    depends_on:
      - postgres
      - events
    networks:
      - pulsehive-mesh
    develop:
      watch:
        - path: ./services/payments
          target: /app
          action: sync
          ignore:
            - node_modules/
        - path: ./services/payments/package.json
          action: rebuild

  events:
    build:
      context: ./services/events
    container_name: pulsehive-event-bus
    ports:
      - "5000:5000"
    environment:
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      EVENT_SUBSCRIBERS: payment.matched=http://orders:4002/events,order.created=http://payments:4003/events
    depends_on:
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:5000/health', res => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - pulsehive-mesh
    develop:
      watch:
        - path: ./services/events
          target: /app
          action: sync
          ignore:
            - node_modules/
        - path: ./services/events/package.json
          action: rebuild

  admin:
    build:
      context: ./apps/admin
      dockerfile: Dockerfile
    container_name: pulsehive-admin
    ports:
      - "3000:3000"
    command: npm run dev
    depends_on:
      - api
    environment:
      - NODE_ENV=development
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true
    networks:
      - pulsehive-mesh
    develop:
      watch:
        - path: ./apps/admin
          target: /app
          action: sync
          ignore:
            - node_modules/
            - .next/
        - path: ./apps/admin/package.json
          action: rebuild

volumes:
  postgres_data:
  rabbitmq_data: