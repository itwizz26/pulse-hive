<svg width="60" height="60" viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    @keyframes pulse-outer {
      0% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.1); opacity: 0.7; }
      100% { transform: scale(1); opacity: 1; }
    }
    @keyframes pulse-inner {
      0% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.2); opacity: 0.8; }
      100% { transform: scale(1); opacity: 1; }
    }
    .outer-ring {
      transform-origin: center center;
      animation: pulse-outer 2s infinite ease-in-out;
      fill: #4c51bf; /* Example colour 1 (Indigo-700) */
    }
    .inner-ring {
      transform-origin: center center;
      animation: pulse-inner 2s infinite ease-in-out;
      animation-delay: 0.2s; /* Slightly offset pulse */
      fill: #8b5cf6; /* Example colour 2 (Violet-500) */
    }
  </style>
  <circle cx="30" cy="30" r="25" class="outer-ring" />
  <circle cx="30" cy="30" r="15" class="inner-ring" />
</svg>
