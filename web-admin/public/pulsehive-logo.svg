<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pulseGradient1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366F1" /> {/* Indigo-500 */}
      <stop offset="50%" stop-color="#22D3EE" /> {/* Cyan-500 */}
      <stop offset="100%" stop-color="#10B981" /> {/* Emerald-500 */}
    </linearGradient>
    <linearGradient id="pulseGradient2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F59E0B" /> {/* Amber-500 */}
      <stop offset="100%" stop-color="#EF4444" /> {/* Red-500 */}
    </linearGradient>
  </defs>

  <g className="animate-pulse">
    {/* Pulsating background circle */}
    <circle cx="60" cy="60" r="40" fill="url(#pulseGradient1)" opacity="0.6" />
    <circle cx="60" cy="60" r="30" fill="url(#pulseGradient2)" opacity="0.7" />

    {/* Abstract 'P' shape with gradient */}
    <path d="M40 30v60h20c11 0 20-9 20-20v-20c0-11-9-20-20-20H58v-10c0-11-9-20-20-20H40Z" fill="url(#pulseGradient1)" />
    
    {/* Smaller pulsating element within the 'P' */}
    <circle cx="70" cy="60" r="15" fill="url(#pulseGradient2)" opacity="0.85">
      <animate attributeName="r" values="15;20;15" dur="2s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.85;0.5;0.85" dur="2s" repeatCount="indefinite" />
    </circle>

    {/* Subtle glow effect */}
    <g filter="url(#glow)">
      <circle cx="60" cy="60" r="50" fill="url(#pulseGradient1)" opacity="0.1" />
    </g>
  </g>

  {/* Filter for glow effect */}
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="10" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
</svg>
